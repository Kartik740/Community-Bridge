name: community_bridge_mobile
description: CommunityBridge — Volunteer field app for NGO data collection and emergency response.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.3


  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking & Connectivity
  connectivity_plus: ^5.0.2

  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.3.0

  # Maps & Navigation
  google_maps_flutter: ^2.5.3
  url_launcher: ^6.2.4

  # Media
  image_picker: ^1.0.7

  # State Management
  provider: ^6.1.1

  # Utils
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  step_progress_indicator: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
#  assets:
#    - assets/
